name: Deploy Dev

on:
  push:
    branches:
      - master

concurrency:
  group: monorepo-course-dev-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      REPO_URL: https://github.com/alesiooooooo/monorepo-course.git
      APP_DIR: /opt/apps/monorepo-course
      TARGET_ENV: learn-aws-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target EC2
        id: target
        run: |
          set -euo pipefail

          INSTANCE_ID="$(
            aws ec2 describe-instances \
              --region "$AWS_REGION" \
              --filters \
                "Name=tag:Project,Values=monorepo-course" \
                "Name=tag:Environment,Values=learn-aws-dev" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].InstanceId' \
              --output text
          )"

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running dev instance found"
            exit 1
          fi

          if printf '%s' "$INSTANCE_ID" | grep -q '[[:space:]]'; then
            echo "Expected exactly one dev instance, got: $INSTANCE_ID"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Send deploy command
        id: send
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -n "${GH_PAT:-}" ]; then
            CLONE_URL="https://x-access-token:${GH_PAT}@github.com/alesiooooooo/monorepo-course.git"
          else
            CLONE_URL="$REPO_URL"
          fi

          cat > /tmp/ssm-commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "mkdir -p /opt/apps",
              "if [ ! -d '$APP_DIR/.git' ]; then rm -rf '$APP_DIR' && git clone '$CLONE_URL' '$APP_DIR'; fi",
              "cd '$APP_DIR'",
              "git remote set-url origin '$CLONE_URL'",
              "git fetch --prune origin",
              "git reset --hard '$GITHUB_SHA'",
              "chown -R ec2-user:ec2-user '$APP_DIR'",
              "runuser -l ec2-user -c 'cd $APP_DIR && npm install'",
              "runuser -l ec2-user -c 'cd $APP_DIR && npm run build'",
              "runuser -l ec2-user -c 'cd $APP_DIR && AWS_REGION=$AWS_REGION bash deploy/scripts/sync-env.sh $APP_DIR/deploy $TARGET_ENV'",
              "runuser -l ec2-user -c 'cd $APP_DIR && bash deploy/scripts/render-env.sh $APP_DIR/deploy'",
              "runuser -l ec2-user -c 'cd $APP_DIR && bash deploy/scripts/run-migrations.sh $APP_DIR/deploy $TARGET_ENV'",
              "runuser -l ec2-user -c 'cd $APP_DIR && pm2 startOrReload deploy/ecosystem.config.js --update-env'",
              "runuser -l ec2-user -c 'pm2 restart auth-service orders-service payments-service --update-env'",
              "runuser -l ec2-user -c 'pm2 save'",
              "curl --fail --silent http://127.0.0.1:3001/login >/dev/null",
              "curl --fail --silent -X POST http://127.0.0.1:3002/orders -H \\\"Content-Type: application/json\\\" -d \\\"{}\\\" >/dev/null",
              "curl --fail --silent http://127.0.0.1:3003/pay >/dev/null"
            ]
          }
          EOF

          COMMAND_ID="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy monorepo-course ${GITHUB_SHA}" \
              --parameters file:///tmp/ssm-commands.json \
              --query 'Command.CommandId' \
              --output text
          )"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy result
        env:
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
          COMMAND_ID: ${{ steps.send.outputs.command_id }}
        run: |
          set -euo pipefail

          while true; do
            STATUS="$(
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'Status' \
                --output text
            )"

            echo "SSM status: $STATUS"

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text
                break
                ;;
              Cancelled|Cancelling|Failed|TimedOut)
                echo "Deploy failed with status: $STATUS"
                echo "--- stdout ---"
                aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' \
                  --output text
                exit 1
                ;;
            esac

            sleep 10
          done
